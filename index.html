<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My World</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* General Page Setup */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden; /* Keeps floating things from creating scrollbars */
        }

        /* The Profile Icon on the Left */
        .profile-icon {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 100px;
            height: 100px;
            border: 4px solid #39ff14; /* Neon green border */
            box-shadow: 6px 6px 0px #555555; /* Blocky retro shadow */
            image-rendering: pixelated; /* Makes the image look sharp and retro */
            z-index: 10;
        }

        /* Main Title */
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
        }

        /* Connect / Links Section */
        .links-box {
            border: 2px dashed #555;
            padding: 20px;
            margin: 20px 0;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7); /* Slightly dark background so it's readable */
        }

        .links-box h2 {
            font-size: 14px;
            color: #39ff14;
            margin-bottom: 20px;
        }

        .link-item {
            display: block;
            margin: 15px 0;
            color: #888888;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }

        .link-item:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff;
        }

        /* Floating Background Elements */
        .particle {
            position: absolute;
            bottom: -50px;
            color: #39ff14;
            font-size: 10px;
            opacity: 0.3;
            animation: floatUp linear infinite;
            z-index: 1;
        }

        /* CSS Animation for Floating */
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Setting different speeds and positions for each floating element */
        .p1 { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .p2 { left: 30%; animation-duration: 18s; animation-delay: 2s; }
        .p3 { left: 50%; animation-duration: 15s; animation-delay: 4s; }
        .p4 { left: 70%; animation-duration: 20s; animation-delay: 1s; }
        .p5 { left: 90%; animation-duration: 14s; animation-delay: 3s; }

    </style>
</head>
<body>

    <div class="particle p1">+</div>
    <div class="particle p2">*</div>
    <div class="particle p3">&lt;/&gt;</div>
    <div class="particle p4">#</div>
    <div class="particle p5">+</div>

    <img src="https://via.placeholder.com/100/000000/39ff14?text=ICON" alt="My Icon" class="profile-icon">

    <h1>YOUR NAME</h1>

    <div class="links-box">
        <h2>> CONNECT <</h2>
        <a href="littleplay_yt" class="link-item">Discord</a>
        <a href="https://www.instagram.com/littleplay._.1115/" class="link-item">ig / X</a>
        <a href="https://www.roblox.com/users/3145767289/profile" class="link-item">roblox</a>
    </div>

</body>
</html>
